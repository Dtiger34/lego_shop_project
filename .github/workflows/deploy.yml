name: Build and deploy Node.js app to Azure Web App - legoshop

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # Install backend dependencies
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci --omit=dev

      # Install frontend dependencies and build
      - name: Install frontend dependencies and build
        run: |
          cd frontend
          npm ci
          npm run build

      # Prepare deployment structure
      - name: Prepare deployment structure
        run: |
          # Copy backend files
          mkdir -p deploy
          cp -r backend/* deploy/

          # Copy frontend build to public folder
          mkdir -p deploy/public
          cp -r frontend/dist/* deploy/public/

          # Copy root package files if needed
          cp package*.json deploy/ 2>/dev/null || :

      # Upload artifact without zipping
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FDE98D2DFC204DEAA60A48422693E557 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_74A66BFCFC124175B46BB9B8C59A48CE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_705CA6ACF8454080B34C5FC342851399 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "legoshop"
          slot-name: "Production"
          package: .
