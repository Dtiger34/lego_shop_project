name: CI/CD LegoShop

on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Backend
      - name: Install backend
        run: |
          cd backend
          npm ci --omit=dev

      # Frontend
      - name: Build frontend
        env:
          NODE_ENV: production
        run: |
          cd frontend
          npm ci
          npm run build

      # Create deploy folder
      - name: Prepare deploy folder
        run: |
          mkdir deploy
          cp -r backend/* deploy/
          mkdir deploy/public
          cp -r frontend/dist/* deploy/public/

      # Upload artifact
      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: legoshop-build
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: legoshop-build
          path: deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FDE98D2DFC204DEAA60A48422693E557 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_74A66BFCFC124175B46BB9B8C59A48CE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_705CA6ACF8454080B34C5FC342851399 }}

      - name: Configure Azure Web App Settings
        run: |
          az webapp config appsettings set --name legoshop --resource-group legoshop-rg \
            --settings NODE_ENV=production \
            PORT=8080 \
            WEBSITE_NODE_DEFAULT_VERSION=22

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: legoshop
          package: deploy
