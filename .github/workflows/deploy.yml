name: Build and deploy Node.js app to Azure Web App - legoshop

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # install root deps
      - name: Install root dependencies
        run: npm install

      # install backend deps
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      # install frontend deps
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      # build react
      - name: Build React
        run: |
          cd frontend
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FDE98D2DFC204DEAA60A48422693E557 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_74A66BFCFC124175B46BB9B8C59A48CE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_705CA6ACF8454080B34C5FC342851399 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: legoshop
          slot-name: Production
          package: .
